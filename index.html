<!DOCTYPE html>
<!--
  Street View → A-Frame（キューブマップ方式）  ※挑戦枠 / 保険デモ
  ------------------------------------------------------------------
  ・公式 Street View Static API の画像6枚（前後左右＋上下）を箱の内側に貼り、
    A-Frame / WebXR で首振り表示する。古い aframe-streetview-component（削除済み・
    内部タイル直叩き）より壊れにくい“文書化されたAPI”を使う。
  ・要 HTTPS 配信（GitHub Pages / Netlify / Cloudflare Pages 等）。
  ・要：Google Cloud で「Street View Static API」を有効化し、API キーの制限が
    それを許可していること（Map Tiles 専用に絞っていると弾かれる）。
  ・想定される最初の壁は2つ → 下の「テスト時メモ」参照。
      (1) CORS で面が真っ黒  … PROXY を設定（後述のWorker）
      (2) 継ぎ目/上下のズレ   … HEADING / 各面の回転を微調整
  ------------------------------------------------------------------
-->
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Street View 360° (A-Frame)</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <style>
    html,body{margin:0;height:100%;background:#0E1118;color:#ECEEF4;
      font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI",system-ui,sans-serif;overflow:hidden;}
    #hud{position:fixed;left:16px;top:16px;z-index:10;max-width:min(360px,90vw);
      background:rgba(20,25,36,.86);border:1px solid #2A3142;border-radius:12px;
      padding:12px 14px;backdrop-filter:blur(8px);}
    #hud h1{margin:0 0 4px;font-size:16px;}
    #status{font-size:12.5px;color:#9AA3B5;margin:2px 0 0;line-height:1.5;}
    #enter{margin-top:10px;width:100%;cursor:pointer;font:inherit;font-weight:800;
      color:#0E1118;background:#C9A24B;border:none;border-radius:9px;padding:11px;}
    #enter:active{transform:translateY(1px);}
  </style>
</head>
<body>
  <div id="hud">
    <h1>Street View 360°</h1>
    <p id="status">読み込み中…</p>
    <button id="enter">VRで見る</button>
    <p style="font-size:11.5px;color:#7E879B;margin:8px 0 0;line-height:1.5;">
      操作：スティック前後で移動／首振りで見回す<br>（PCはキーボード ↑↓ でも移動可）
    </p>
  </div>

  <a-scene background="color: #0E1118" renderer="colorManagement: true; antialias: true"
           vr-mode-ui="enabled: true">
    <!-- ↓ ここのパラメータを書き換えるだけ -->
    <a-entity id="sv"
      sv-cubemap="
        key: AIzaSyBxrs-r-FYvqsZUS6Mg9jKXgcaOi-Kc6O4;
        lat: 35.44579676097165;
        lng: 139.64976890646292;
        heading: 0;
        size: 640;
        radius: 80;
        proxy: ">
    </a-entity>

    <a-camera wasd-controls-enabled="false" look-controls></a-camera>
    <a-entity laser-controls="hand: right"></a-entity>
    <a-entity laser-controls="hand: left"></a-entity>
  </a-scene>

  <script>
  AFRAME.registerComponent('sv-cubemap', {
    schema: {
      key:    {type:'string'},
      lat:    {type:'number'},
      lng:    {type:'number'},
      heading:{type:'number', default:0},
      size:   {type:'number', default:640},
      radius: {type:'number', default:50},
      step:   {type:'number', default:10},   // 1歩で進む距離(m)。Google地図の隣パノラマ間隔(市街地≒10m)に合わせた近似。同じ点ならリトライで延長して隣の撮影点を1つずつ渡る
      proxy:  {type:'string', default:''}    // 例: https://xxx.workers.dev/?url=
    },

    init: function () {
      this.status     = document.getElementById('status');
      this.loader     = new THREE.TextureLoader();
      this.loader.setCrossOrigin('anonymous');
      this.loading    = false;   // 読み込み中フラグ（多重リクエスト防止）
      this.axisReady  = true;    // スティックが中立に戻ったか（連射防止）
      this.lastLat    = this.data.lat;   // 最後に表示できた地点（移動失敗時はここへ戻す）
      this.lastLng    = this.data.lng;
      this.panoId     = null;            // 現在のパノラマID（同じ点への移動を避けるため）
      this.fade       = null;            // 移動時クロスフェードの進行状態
      this.srcTex     = null;            // 現ロケーションの素材テクスチャ（再ベイク用に保持）
      // 上面/底面の向き(0〜7: 90°回転×左右反転の8通り)。実機/PC検証で 6/6 が正しいと確定（2026-06-28）。
      //   T/Bキー、または URL ?tcap=&bcap= で再調整も可能。
      const q = new URLSearchParams(location.search);
      const tq = q.get('tcap'), bq = q.get('bcap');
      this.tcap = (tq !== null ? parseInt(tq, 10) : 6) & 7;
      this.bcap = (bq !== null ? parseInt(bq, 10) : 6) & 7;
      this.loadCubemap();
      this.bindControls();
      // 初期パノラマIDを取得（最初の1歩から正しく次の点へ進めるように）
      const self0 = this;
      fetch(this.metaUrl(this.data.lat, this.data.lng), { referrerPolicy: 'unsafe-url' })
        .then(r => r.json())
        .then(m => { if (m.status === 'OK') self0.panoId = m.pano_id; })
        .catch(() => {});
    },

    // three.js BoxGeometry のマテリアル順: [+X, -X, +Y, -Y, +Z, -Z]
    //   A-Frame の既定カメラは -Z を向く = 正面。よって -Z 面に heading(正面) を割り当てる。
    //   ※上下(idx 2,3)は assembleCube で天面/底面に実画像を貼る。
    sideFaces: function (heading) {
      return [
        { idx:0, heading: heading + 90  }, // +X 右
        { idx:1, heading: heading - 90  }, // -X 左
        { idx:4, heading: heading + 180 }, // +Z 後
        { idx:5, heading: heading       }  // -Z 正面
      ];
    },

    buildUrl: function (heading, pitch, fov) {
      const d = this.data;
      const h = ((heading % 360) + 360) % 360;
      // パノラマIDが分かっていれば pano= で確実に一致させる。無ければ座標＋半径で取得。
      const place = this.panoId
        ? `pano=${this.panoId}`
        : `location=${d.lat},${d.lng}&radius=${d.radius}`;
      const target =
        'https://maps.googleapis.com/maps/api/streetview' +
        `?size=${d.size}x${d.size}&${place}` +
        `&fov=${fov}&heading=${h}&pitch=${pitch}` +
        `&return_error_code=true&key=${d.key}`;
      return d.proxy ? d.proxy + encodeURIComponent(target) : target;
    },

    // 指定メッシュのテクスチャ・マテリアル・ジオメトリを破棄（GPUメモリリーク防止）
    disposeMeshObj: function (mesh) {
      if (!mesh) return;
      (Array.isArray(mesh.material) ? mesh.material : [mesh.material]).forEach(m => {
        if (m && m.map) m.map.dispose();
        if (m) m.dispose();
      });
      if (mesh.geometry) mesh.geometry.dispose();
    },

    // 球体メッシュ（キューブRTを参照）を破棄。GPUメモリも忘れず解放する。
    disposeSphere: function (mesh) {
      if (!mesh) return;
      if (mesh.material) mesh.material.dispose();
      if (mesh.geometry) mesh.geometry.dispose();
      const u = mesh.userData || {};
      if (u.cubeRT) u.cubeRT.dispose();
    },

    // テクスチャに 90°回転×左右反転（向き8通り: idx 0〜7）を適用。
    //   rot = idx%4（×90°）, mirror = idx>=4。中心(0.5,0.5)基準なので uv は [0,1] に収まる。
    applyOrient: function (tex, idx) {
      const rot = idx % 4, mirror = idx >= 4 ? -1 : 1;
      tex.center.set(0.5, 0.5);
      tex.rotation = rot * Math.PI / 2;
      tex.repeat.set(mirror, 1);
      tex.offset.set(0, 0);
      tex.needsUpdate = true;
    },

    // 現ロケーションの素材テクスチャ(this.srcTex)から、上下面の向きを適用して
    //   6面の箱を組み、CubeCamera で完全なキューブテクスチャに焼く（上下も実画像＝歪み無し）。
    //   ※maps(素材テクスチャ)は再ベイクで使い回すので、ここでは破棄しない。
    assembleCube: function () {
      const s = this.srcTex;
      const mats = new Array(6);
      s.sides.forEach(o => { mats[o.idx] = new THREE.MeshBasicMaterial({ map: o.tex, side: THREE.BackSide }); });
      this.applyOrient(s.top, this.tcap);
      this.applyOrient(s.bot, this.bcap);
      mats[2] = new THREE.MeshBasicMaterial({ map: s.top, side: THREE.BackSide }); // +Y 上面
      mats[3] = new THREE.MeshBasicMaterial({ map: s.bot, side: THREE.BackSide }); // -Y 底面
      const box = new THREE.Mesh(new THREE.BoxGeometry(500, 500, 500), mats);
      const rt = this.renderToCube(box);
      box.geometry.dispose();
      mats.forEach(m => m.dispose());   // map は this.srcTex 側で保持するので解放しない
      return rt;
    },

    // T/Bキーで上下面の向きを変えたとき、再取得せず（無料で）焼き直して即反映。
    rebakeOrient: function () {
      const sphere = this.el.getObject3D('mesh');
      if (!sphere || !this.srcTex) return;
      const oldRT = sphere.userData.cubeRT;
      const newRT = this.assembleCube();
      sphere.material.uniforms.tCube.value = newRT.texture;
      sphere.userData.cubeRT = newRT;
      if (oldRT) oldRT.dispose();
      this.status.textContent = this.orientStatus();
    },

    orientStatus: function () {
      return `TOP=${this.tcap} / BOT=${this.bcap}（T:上面 B:底面 を回転して合わせる）`;
    },

    // 画面外の箱(側面4枚)を CubeCamera で1枚のキューブテクスチャに焼く。
    //   側面の向きは既存ロジックそのまま → 焼けたキューブの向きも自動的に正しい（横は継ぎ目なし）。
    //   CubeCamera.update は内部で xr.enabled を一時OFFにするので XR中でも安全。
    renderToCube: function (boxMesh) {
      const renderer = this.el.sceneEl.renderer;
      const rt = new THREE.WebGLCubeRenderTarget(this.data.size, {
        generateMipmaps: false,
        minFilter: THREE.LinearFilter,
        magFilter: THREE.LinearFilter
      });
      rt.texture.colorSpace = THREE.SRGBColorSpace;   // 箱の色味をそのまま保持
      const cam = new THREE.CubeCamera(1, 2000, rt);
      const scene = new THREE.Scene();
      scene.add(boxMesh);
      cam.update(renderer, scene);
      scene.remove(boxMesh);
      return rt;
    },

    // 内側から見る球体。6面の完全なキューブ(側面+上下すべて実画像)をそのままサンプル。
    //   上下も gnomonic ではなく実画像なので、建物などが引き伸ばされず歪まない。
    makeSphere: function (cubeRT) {
      const mat = new THREE.ShaderMaterial({
        uniforms: {
          tCube:   { value: cubeRT.texture },
          opacity: { value: 1.0 }
        },
        vertexShader:
          'varying vec3 vDir;\n' +
          'void main(){\n' +
          '  vDir = normalize( mat3(modelMatrix) * position );\n' +
          '  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);\n' +
          '}',
        fragmentShader: [
          'uniform samplerCube tCube;',
          'uniform float opacity;',
          'varying vec3 vDir;',
          'void main(){',
          '  gl_FragColor = vec4(textureCube(tCube, normalize(vDir)).rgb, opacity);',
          '}'
        ].join('\n'),
        side: THREE.BackSide,
        transparent: false
      });
      const sphere = new THREE.Mesh(new THREE.SphereGeometry(500, 64, 40), mat);
      sphere.userData.cubeRT = cubeRT;   // 破棄時に解放するため保持
      return sphere;
    },

    // 現在の d.lat / d.lng / d.heading で景色を（再）構築。
    //   側面4枚＋上下2枚すべて fov90 で撮り、6面の箱→完全なキューブに焼く（歪み無し）。計6リクエスト。
    //   素材テクスチャは this.srcTex に保持し、T/Bキーでの再ベイクで使い回す。
    //   isMove=true（移動時）に全滅したら暗転させず元の景色へ引き返す。
    loadCubemap: function (isMove) {
      const d = this.data;
      const self = this;
      this.loading = true;
      this.status.textContent = '読み込み中…';

      const FOV = 90;                       // 側面・上下とも fov90＝キューブの各面そのもの
      const sides = this.sideFaces(d.heading);
      const sideTex = [];
      let topTex = null, botTex = null;

      let pending = 6, failed = 0;
      const done = () => { if (--pending === 0) finish(); };

      // 側面4枚
      sides.forEach(f => {
        const url = this.buildUrl(f.heading, 0, FOV);
        const tex = this.loader.load(url, done, undefined,
          (e) => { failed++; console.error('side load err idx=' + f.idx, e); done(); });
        tex.colorSpace = THREE.SRGBColorSpace;
        // BackSide（箱の内側）で見ると左右反転するので水平フリップで補正
        tex.wrapS = THREE.RepeatWrapping;
        tex.repeat.x = -1; tex.offset.x = 1;
        sideTex.push({ idx: f.idx, tex });
      });

      // 上下2枚（fov90。箱の天面/底面に直接貼る。向きは assembleCube で適用）
      const loadCap = (pitch, assign) => {
        const url = this.buildUrl(d.heading, pitch, FOV);
        const tex = this.loader.load(url, done, undefined,
          (e) => { failed++; console.error('cap load err pitch=' + pitch, e); done(); });
        tex.colorSpace = THREE.SRGBColorSpace;
        assign(tex);
      };
      loadCap( 90, t => { topTex = t; });
      loadCap(-90, t => { botTex = t; });

      // 全6枚の読み込みが終わってから差し替え（暗転防止）
      function finish() {
        self.loading = false;

        // 移動先で全滅 → 元の景色を維持して引き返す
        if (failed >= 6 && isMove) {
          d.lat = self.lastLat; d.lng = self.lastLng;
          sideTex.forEach(o => o.tex.dispose());
          if (topTex) topTex.dispose();
          if (botTex) botTex.dispose();
          self.status.textContent = 'その方向にはこれ以上進めません。';
          return;
        }

        // 直前ロケーションの素材テクスチャ（再ベイク用に保持していた分）を解放
        if (self.srcTex) {
          self.srcTex.sides.forEach(o => o.tex.dispose());
          self.srcTex.top.dispose(); self.srcTex.bot.dispose();
        }
        self.srcTex = { sides: sideTex, top: topTex, bot: botTex };

        // 6面の箱を完全なキューブに焼く（横も上下も継ぎ目・歪み無し）
        const cubeRT  = self.assembleCube();
        const sphere  = self.makeSphere(cubeRT);
        const oldMesh = self.el.getObject3D('mesh');   // 直前まで見ていた景色
        self.el.setObject3D('mesh', sphere);           // setObject3D が old を親から外す
        self.lastLat = d.lat; self.lastLng = d.lng;

        // 移動時は「前の景色を手前に残して徐々に消す＋軽くズーム」でGoogleマップ風に繋ぐ。
        // 初回ロードや非移動時は単純に破棄。
        if (isMove && oldMesh) self.startFade(oldMesh);
        else if (oldMesh)      self.disposeSphere(oldMesh);

        if (failed === 0) self.status.textContent = self.orientStatus();
        else self.status.textContent =
          `${failed}/6 枚が読み込めませんでした。コンソールに CORS エラーが出ていれば PROXY を設定してください。`;
      }
    },

    // メタデータAPI（無料）のURLを作る。source=outdoor は付けない（屋外限定で弾かれるのを防ぐ）
    metaUrl: function (lat, lng) {
      const d = this.data;
      const u = 'https://maps.googleapis.com/maps/api/streetview/metadata' +
                '?location=' + lat + ',' + lng + '&radius=' + d.radius +
                '&key=' + d.key;
      return d.proxy ? d.proxy + encodeURIComponent(u) : u;
    },

    // 緯度経度から、bearing 方向へ dist メートル進んだ地点を返す
    offset: function (lat, lng, bearingDeg, dist) {
      const R = 6378137;
      const br = THREE.MathUtils.degToRad(bearingDeg);
      return {
        lat: lat + THREE.MathUtils.radToDeg(dist * Math.cos(br) / R),
        lng: lng + THREE.MathUtils.radToDeg(dist * Math.sin(br) / (R * Math.cos(THREE.MathUtils.degToRad(lat))))
      };
    },

    // 今見ている方向（カメラの視線）へ進む。sign>0 前進 / <0 後退
    move: function (sign) {
      if (this.loading) return;
      const cam = this.el.sceneEl.camera;
      if (!cam) return;
      const dir = new THREE.Vector3();
      cam.getWorldDirection(dir);       // カメラの視線方向（HMDの向きも反映）
      let bearing = this.data.heading + THREE.MathUtils.radToDeg(Math.atan2(dir.x, -dir.z));
      if (sign < 0) bearing += 180;
      bearing = ((bearing % 360) + 360) % 360;
      this.loading = true;              // 探索中も入力をブロック
      this.tryStep(bearing, this.data.step, 0);
    },

    // bearing 方向 dist メートル先の「実在する最寄りパノラマ」を探して移動。
    //   見つからない/同じ点なら距離を伸ばして数回リトライ（飛び飛びの撮影点を渡り歩く）。
    tryStep: function (bearing, dist, attempt) {
      const d = this.data, self = this;
      const t = this.offset(d.lat, d.lng, bearing, dist);
      fetch(this.metaUrl(t.lat, t.lng), { referrerPolicy: 'unsafe-url' })
        .then(r => r.json())
        .then(meta => {
          if (meta.status === 'OK' && meta.location) {
            // 同じパノラマに留まる → もっと先を狙う
            if (meta.pano_id && meta.pano_id === self.panoId && attempt < 6) {
              self.tryStep(bearing, dist + d.step, attempt + 1);
              return;
            }
            self.panoId = meta.pano_id;
            d.lat = meta.location.lat;
            d.lng = meta.location.lng;
            self.loading = false;
            self.loadCubemap(true);      // 実在点なので基本成功する
          } else if (attempt < 6) {
            // その地点に写真が無い（隙間）→ さらに先へ
            self.tryStep(bearing, dist + d.step, attempt + 1);
          } else {
            self.loading = false;
            self.status.textContent = 'その方向にはこれ以上進めません。';
          }
        })
        .catch(err => {
          self.loading = false;
          self.status.textContent = 'その方向にはこれ以上進めません。';
          console.error('metadata fetch error', err);
        });
    },

    // 移動演出：古い景色を最前面に置き、透過させながら少し拡大して「前進」感を出す。
    //   実際の描画(透過の更新)は tick() が毎フレーム進める。
    startFade: function (oldMesh) {
      // 進行中のフェードがあれば（連続移動）即終了して破棄
      if (this.fade) { this.el.removeObject3D('mesh_fade'); this.disposeSphere(this.fade.mesh); this.fade = null; }
      const mat = oldMesh.material;
      mat.transparent = true; mat.depthTest = false; mat.depthWrite = false; mat.needsUpdate = true;
      oldMesh.renderOrder = 999;          // 新しい景色より常に手前に描画
      oldMesh.scale.set(1, 1, 1);
      this.el.setObject3D('mesh_fade', oldMesh);
      this.fade = { mesh: oldMesh, t: 0, dur: 0.9 };   // 0.9秒かけてゆっくり消える
    },

    // スティック入力を「1回倒す=1歩」に変換（倒しっぱなしの連射＝課金暴走を防止）
    handleAxis: function (y) {
      const PUSH = 0.6, NEUTRAL = 0.25;
      if      (this.axisReady && y < -PUSH) { this.axisReady = false; this.move(+1); }
      else if (this.axisReady && y >  PUSH) { this.axisReady = false; this.move(-1); }
      else if (Math.abs(y) < NEUTRAL)       { this.axisReady = true; }  // 中立に戻ったら次の入力を許可
    },

    bindControls: function () {
      const self = this;
      // PCテスト用キーボード（↑/W=前進, ↓/S=後退）
      window.addEventListener('keydown', e => {
        if (e.key === 'ArrowUp'   || e.key === 'w' || e.key === 'W') self.move(+1);
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') self.move(-1);
        // 上下面の向き合わせ（T=上面 / B=底面 を8通り切替→無料で焼き直し）
        if (e.key === 't' || e.key === 'T') { self.tcap = (self.tcap + 1) & 7; self.rebakeOrient(); }
        if (e.key === 'b' || e.key === 'B') { self.bcap = (self.bcap + 1) & 7; self.rebakeOrient(); }
      });
    },

    // 毎フレーム：移動演出(クロスフェード)を進め、スティックY(axes[3])を読み移動を駆動。
    tick: function (time, dt) {
      // --- 移動時クロスフェード（前の景色を徐々に透過＋ズーム） ---
      if (this.fade) {
        this.fade.t += (dt || 16) / 1000;
        const k = Math.min(this.fade.t / this.fade.dur, 1);   // 0→1
        const m = this.fade.mesh;
        // フェードはズームに対して後ろ寄り(1 - k*k)。ズーム中は不透明を保ち、終盤に消える＝ズーム＞フェード。
        if (m.material.uniforms && m.material.uniforms.opacity) m.material.uniforms.opacity.value = 1 - k * k;
        const s = 1 + 0.4 * k;                                // 前進しているような前へのズーム（強め）
        m.scale.set(s, s, s);
        if (k >= 1) { this.el.removeObject3D('mesh_fade'); this.disposeSphere(m); this.fade = null; }
      }

      const xr = this.el.sceneEl.renderer && this.el.sceneEl.renderer.xr;
      const session = (xr && xr.getSession && xr.getSession()) || this.el.sceneEl.xrSession;
      if (!session || !session.inputSources || !session.inputSources.length) return;

      let y = 0;
      for (let i = 0; i < session.inputSources.length; i++) {
        const gp = session.inputSources[i].gamepad;
        if (!gp || !gp.axes) continue;
        const ty = (gp.axes.length >= 4) ? gp.axes[3] : gp.axes[1];  // スティックY
        if (ty !== undefined && Math.abs(ty) > Math.abs(y)) y = ty;
      }

      this.handleAxis(y);
    }
  });

  document.getElementById('enter').addEventListener('click', () => {
    const scene = document.querySelector('a-scene');
    if (scene.enterVR) scene.enterVR();
  });
  </script>
</body>
</html>
