<!DOCTYPE html>
<!--
  Street View → A-Frame（キューブマップ方式）  ※挑戦枠 / 保険デモ
  ------------------------------------------------------------------
  ・公式 Street View Static API の画像6枚（前後左右＋上下）を箱の内側に貼り、
    A-Frame / WebXR で首振り表示する。古い aframe-streetview-component（削除済み・
    内部タイル直叩き）より壊れにくい“文書化されたAPI”を使う。
  ・要 HTTPS 配信（GitHub Pages / Netlify / Cloudflare Pages 等）。
  ・要：Google Cloud で「Street View Static API」を有効化し、API キーの制限が
    それを許可していること（Map Tiles 専用に絞っていると弾かれる）。
  ・想定される最初の壁は2つ → 下の「テスト時メモ」参照。
      (1) CORS で面が真っ黒  … PROXY を設定（後述のWorker）
      (2) 継ぎ目/上下のズレ   … HEADING / 各面の回転を微調整
  ------------------------------------------------------------------
-->
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Street View 360° (A-Frame)</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <style>
    html,body{margin:0;height:100%;background:#0E1118;color:#ECEEF4;
      font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI",system-ui,sans-serif;overflow:hidden;}
    #hud{position:fixed;left:16px;top:16px;z-index:10;max-width:min(360px,90vw);
      background:rgba(20,25,36,.86);border:1px solid #2A3142;border-radius:12px;
      padding:12px 14px;backdrop-filter:blur(8px);}
    #hud h1{margin:0 0 4px;font-size:16px;}
    #status{font-size:12.5px;color:#9AA3B5;margin:2px 0 0;line-height:1.5;}
    #enter{margin-top:10px;width:100%;cursor:pointer;font:inherit;font-weight:800;
      color:#0E1118;background:#C9A24B;border:none;border-radius:9px;padding:11px;}
    #enter:active{transform:translateY(1px);}
  </style>
</head>
<body>
  <div id="hud">
    <h1>Street View 360°</h1>
    <p id="status">読み込み中…</p>
    <button id="enter">VRで見る</button>
    <p style="font-size:11.5px;color:#7E879B;margin:8px 0 0;line-height:1.5;">
      操作：スティック前後で移動／首振りで見回す<br>（PCはキーボード ↑↓ でも移動可）
    </p>
  </div>

  <a-scene background="color: #0E1118" renderer="colorManagement: true; antialias: true"
           vr-mode-ui="enabled: true">
    <!-- ↓ ここのパラメータを書き換えるだけ -->
    <a-entity id="sv"
      sv-cubemap="
        key: AIzaSyBxrs-r-FYvqsZUS6Mg9jKXgcaOi-Kc6O4;
        lat: 35.44579676097165;
        lng: 139.64976890646292;
        heading: 0;
        size: 640;
        radius: 80;
        proxy: ">
    </a-entity>

    <a-camera wasd-controls-enabled="false" look-controls>
      <!-- VR内デバッグ表示（コントローラーの生の値を表示。原因特定後は削除可） -->
      <a-text id="dbg" value="diag..." color="#39FF14" align="center"
              width="2.4" position="0 -0.5 -1.2" baseline="top"></a-text>
    </a-camera>
    <a-entity laser-controls="hand: right"></a-entity>
    <a-entity laser-controls="hand: left"></a-entity>
  </a-scene>

  <script>
  AFRAME.registerComponent('sv-cubemap', {
    schema: {
      key:    {type:'string'},
      lat:    {type:'number'},
      lng:    {type:'number'},
      heading:{type:'number', default:0},
      size:   {type:'number', default:640},
      radius: {type:'number', default:50},
      step:   {type:'number', default:15},   // 1歩で進む距離(m)。大きいほど大きく移動
      proxy:  {type:'string', default:''}    // 例: https://xxx.workers.dev/?url=
    },

    init: function () {
      this.status     = document.getElementById('status');
      this.loader     = new THREE.TextureLoader();
      this.loader.setCrossOrigin('anonymous');
      this.loading    = false;   // 読み込み中フラグ（多重リクエスト防止）
      this.axisReady  = true;    // スティックが中立に戻ったか（連射防止）
      this.lastLat    = this.data.lat;   // 最後に表示できた地点（移動失敗時はここへ戻す）
      this.lastLng    = this.data.lng;
      this.loadCubemap();
      this.bindControls();
    },

    // three.js BoxGeometry のマテリアル順: [+X, -X, +Y, -Y, +Z, -Z]
    //   A-Frame の既定カメラは -Z を向く = 正面。よって -Z 面に heading(正面) を割り当てる。
    facesFor: function (heading) {
      return [
        { idx:0, heading: heading + 90, pitch:0   }, // +X 右
        { idx:1, heading: heading - 90, pitch:0   }, // -X 左
        { idx:2, heading: heading,      pitch:90  }, // +Y 上
        { idx:3, heading: heading,      pitch:-90 }, // -Y 下
        { idx:4, heading: heading + 180,pitch:0   }, // +Z 後
        { idx:5, heading: heading,      pitch:0   }  // -Z 正面
      ];
    },

    buildUrl: function (heading, pitch) {
      const d = this.data;
      const h = ((heading % 360) + 360) % 360;
      const target =
        'https://maps.googleapis.com/maps/api/streetview' +
        `?size=${d.size}x${d.size}&location=${d.lat},${d.lng}` +
        `&fov=90&heading=${h}&pitch=${pitch}&radius=${d.radius}` +
        `&source=outdoor&return_error_code=true&key=${d.key}`;
      return d.proxy ? d.proxy + encodeURIComponent(target) : target;
    },

    // 古い箱（メッシュ・テクスチャ）を破棄してGPUメモリリークを防ぐ
    disposeMesh: function () {
      const old = this.el.getObject3D('mesh');
      if (!old) return;
      (Array.isArray(old.material) ? old.material : [old.material]).forEach(m => {
        if (m.map) m.map.dispose();
        m.dispose();
      });
      old.geometry.dispose();
      this.el.removeObject3D('mesh');
    },

    // 現在の d.lat / d.lng / d.heading でキューブを（再）構築。
    //   isMove=true（移動時）に 6/6 失敗したら暗転させず元の景色へ引き返す。
    loadCubemap: function (isMove) {
      const d = this.data;
      const self = this;
      this.loading = true;
      this.status.textContent = '読み込み中…';

      const faces = this.facesFor(d.heading);
      const materials = new Array(6);
      let pending = 6, failed = 0;

      faces.forEach(f => {
        const url = this.buildUrl(f.heading, f.pitch);
        const tex = this.loader.load(
          url,
          () => { if (--pending === 0) finish(); },
          undefined,
          (e) => { failed++; console.error('SV face load error idx=' + f.idx, e);
                   if (--pending === 0) finish(); }
        );
        tex.colorSpace = THREE.SRGBColorSpace;
        // BackSide（箱の内側）で見ると左右反転するので水平フリップで補正
        tex.wrapS = THREE.RepeatWrapping;
        tex.repeat.x = -1; tex.offset.x = 1;
        // 上下面は heading に合わせて面内回転が必要になることが多い（テストで調整）
        if (f.idx === 2 || f.idx === 3) {
          tex.center.set(0.5, 0.5);
          tex.rotation = THREE.MathUtils.degToRad(f.idx === 2 ? -d.heading : d.heading);
        }
        materials[f.idx] = new THREE.MeshBasicMaterial({ map: tex, side: THREE.BackSide });
      });

      // 全6面の読み込みが終わってから差し替え（暗転防止）
      function finish() {
        self.loading = false;

        // 移動先に画像が無い(6/6失敗) → 元の景色を維持して引き返す
        if (failed === 6 && isMove) {
          d.lat = self.lastLat; d.lng = self.lastLng;
          materials.forEach(m => { if (m) { if (m.map) m.map.dispose(); m.dispose(); } });
          self.status.textContent = 'その方向にはこれ以上進めません。';
          return;
        }

        // 新しい箱に差し替え、古い箱を破棄、表示成功した地点を記録
        const mesh = new THREE.Mesh(new THREE.BoxGeometry(500, 500, 500), materials);
        self.disposeMesh();
        self.el.setObject3D('mesh', mesh);
        self.lastLat = d.lat; self.lastLng = d.lng;

        if (failed === 0) self.status.textContent = 'スティック前後で移動／首振りで見渡せます。';
        else self.status.textContent =
          `${failed}/6 面が読み込めませんでした。コンソールに CORS エラーが出ていれば PROXY を設定してください。`;
      }
    },

    // 今見ている方向（カメラの視線）へ step メートル進む。sign>0 前進 / <0 後退
    move: function (sign) {
      if (this.loading) return;        // 読み込み中は無視（多重リクエスト防止）
      const d = this.data;
      const cam = this.el.sceneEl.camera;
      if (!cam) return;
      const dir = new THREE.Vector3();
      cam.getWorldDirection(dir);       // カメラの視線方向（HMDの向きも反映）
      // -Z基準・+Xを正とした角度 → Google Street View の heading(北0°・時計回り)へ
      let bearing = d.heading + THREE.MathUtils.radToDeg(Math.atan2(dir.x, -dir.z));
      if (sign < 0) bearing += 180;
      const br = THREE.MathUtils.degToRad(bearing);
      const R  = 6378137;               // 地球半径(m)
      const dN = d.step * Math.cos(br); // 北方向成分
      const dE = d.step * Math.sin(br); // 東方向成分
      d.lat += THREE.MathUtils.radToDeg(dN / R);
      d.lng += THREE.MathUtils.radToDeg(dE / (R * Math.cos(THREE.MathUtils.degToRad(d.lat))));
      this.loadCubemap(true);   // 移動時：失敗したら元の景色へ引き返す
    },

    // スティック入力を「1回倒す=1歩」に変換（倒しっぱなしの連射＝課金暴走を防止）
    handleAxis: function (y) {
      const PUSH = 0.6, NEUTRAL = 0.25;
      if      (this.axisReady && y < -PUSH) { this.axisReady = false; this.move(+1); }
      else if (this.axisReady && y >  PUSH) { this.axisReady = false; this.move(-1); }
      else if (Math.abs(y) < NEUTRAL)       { this.axisReady = true; }  // 中立に戻ったら次の入力を許可
    },

    bindControls: function () {
      const self = this;
      // PCテスト用キーボード（↑/W=前進, ↓/S=後退）
      window.addEventListener('keydown', e => {
        if (e.key === 'ArrowUp'   || e.key === 'w' || e.key === 'W') self.move(+1);
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') self.move(-1);
      });
    },

    // 【診断版】VR内に各コントローラーの生の axes 値を表示し、
    //   一番大きく動いた軸でとりあえず移動させる（軸番号と符号を特定するため）。
    tick: function () {
      const dbg = document.getElementById('dbg');
      const xr = this.el.sceneEl.renderer && this.el.sceneEl.renderer.xr;
      const session = (xr && xr.getSession && xr.getSession()) || this.el.sceneEl.xrSession;

      if (!session || !session.inputSources || !session.inputSources.length) {
        if (dbg) dbg.setAttribute('value', 'no XR session / no controllers');
        return;
      }

      const lines = [];
      let best = { val: 0, axis: -1, src: -1 };
      for (let i = 0; i < session.inputSources.length; i++) {
        const src = session.inputSources[i];
        const gp = src.gamepad;
        if (!gp) { lines.push('src' + i + ': no gamepad'); continue; }
        const ax = Array.from(gp.axes).map(v => v.toFixed(2));
        lines.push('src' + i + ' [' + (src.handedness || '?') + '] axes:[' + ax.join(', ') + ']');
        for (let a = 0; a < gp.axes.length; a++) {
          if (Math.abs(gp.axes[a]) > Math.abs(best.val)) best = { val: gp.axes[a], axis: a, src: i };
        }
      }
      if (dbg) dbg.setAttribute('value',
        lines.join('\n') + '\n>> biggest: src' + best.src + ' axis' + best.axis + ' = ' + best.val.toFixed(2));

      // 一番大きく倒れた軸で移動を試す（動けば「移動自体はOK／あとは軸選びだけ」と分かる）
      if (Math.abs(best.val) > 0.6) this.handleAxis(best.val);
      else this.handleAxis(0);
    }
  });

  document.getElementById('enter').addEventListener('click', () => {
    const scene = document.querySelector('a-scene');
    if (scene.enterVR) scene.enterVR();
  });
  </script>
</body>
</html>
